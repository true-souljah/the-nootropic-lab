name: build

# Runs on every push and pull request. Builds all 8 region apps in parallel
# using the same `npm ci` flow Cloudflare Pages uses, so any CI-only
# breakage (production install, missing build deps, etc.) surfaces here
# before it reaches the deploy.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typecheck:
    name: packages/ui typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit -p packages/ui/tsconfig.json

  test:
    name: packages/ui unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test

  e2e:
    name: Playwright multi-region smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      # playwright.config.ts runs 7 webServer entries (JP/LATAM/CA/EU/US/AU/GCC
      # on ports 4173/4174/4175/4176/4177/4178/4179) and times out at 60s if
      # any out/ is missing. Build all seven before invoking playwright.
      - run: npm run build:jp
        env:
          NODE_ENV: production
      - run: npm run build:latam
        env:
          NODE_ENV: production
      - run: npm run build:ca
        env:
          NODE_ENV: production
      - run: npm run build:eu
        env:
          NODE_ENV: production
      - run: npm run build:us
        env:
          NODE_ENV: production
      - run: npm run build:au
        env:
          NODE_ENV: production
      - run: npm run build:gcc
        env:
          NODE_ENV: production
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  build:
    name: build ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [us, eu, ca, au, jp, latam, gcc, sea]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      # Mirror Cloudflare's prod install so CI fails the same way prod does.
      # If you drop a build-time dep into devDependencies, this catches it here.
      - run: npm ci --omit=dev
        env:
          NODE_ENV: production

      - run: npm run build:${{ matrix.app }}
        env:
          NODE_ENV: production
