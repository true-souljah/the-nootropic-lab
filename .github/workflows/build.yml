name: build

# Runs on every push and pull request. Builds all 8 region apps in parallel
# using the same `npm ci` flow Cloudflare Pages uses, so any CI-only
# breakage (production install, missing build deps, etc.) surfaces here
# before it reaches the deploy.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typecheck:
    name: packages/ui typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit -p packages/ui/tsconfig.json

  test:
    name: packages/ui unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test

  e2e:
    name: Playwright multi-region smoke (${{ matrix.shard }}/3)
    needs: build
    runs-on: ubuntu-latest
    # The test phase (8 regions x 3 browsers, workers:1 in CI) is ~19 min when
    # run serially — sharding splits the same suite across parallel jobs with
    # no coverage change. workers:1 stays as-is per shard (stability choice in
    # playwright.config.ts); raise the shard count before touching workers.
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium webkit firefox
      # playwright.config.ts runs 8 webServer entries
      # (JP/LATAM/CA/EU/US/AU/GCC/SEA on ports 4173–4180) and times out at
      # 60s if any out/ is missing. PR-Q40 closed the 8-of-8-regions
      # infrastructure milestone. The 8 region builds are reused from the
      # `build` matrix job's artifacts (prod `npm ci --omit=dev` builds — the
      # same bits Cloudflare deploys) instead of rebuilding all 8 sequentially
      # here, which was this workflow's ~20-minute bottleneck.
      - uses: actions/download-artifact@v7
        with:
          pattern: out-*
          path: _out
      - name: Place region builds
        run: |
          for r in us eu ca au jp latam gcc sea; do
            mkdir -p "apps/$r/out"
            cp -R "_out/out-$r/." "apps/$r/out/"
          done
      - run: npm run test:e2e -- --shard=${{ matrix.shard }}/3
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 7

  build:
    name: build ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [us, eu, ca, au, jp, latam, gcc, sea]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      # Mirror Cloudflare's prod install so CI fails the same way prod does.
      # If you drop a build-time dep into devDependencies, this catches it here.
      - run: npm ci --omit=dev
        env:
          NODE_ENV: production

      - run: npm run build:${{ matrix.app }}
        env:
          NODE_ENV: production

      # Share the built site with the e2e job, which previously rebuilt all 8
      # regions sequentially — this workflow's ~20-minute bottleneck.
      - uses: actions/upload-artifact@v7
        with:
          name: out-${{ matrix.app }}
          path: apps/${{ matrix.app }}/out
          retention-days: 1
